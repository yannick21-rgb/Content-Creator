name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: content_creator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/content_creator_test
      TOKEN_ENCRYPTION_KEY: LHMNZSqIaK2POOPdwA/rFBaercbC64nUOdUW9UqADDA=
      OAUTH_PROVIDER_MODE: mock
      PUBLISHER_MODE: fake
      AI_MODE: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply DB schema
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:unit

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target: [web, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.target }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          tags: content-creator:${{ matrix.target }}
