# Local development infrastructure for Content-Creator.
# Brings up PostgreSQL + Redis (and optionally MinIO for S3-compatible media).
#
#   docker compose up -d
#
# Credentials/ports are aligned with .env.example so the app connects with zero
# extra config:
#   DATABASE_URL=postgres://postgres:postgres@localhost:5432/content_creator
#   REDIS_URL=redis://localhost:6379

services:
  postgres:
    image: postgres:18
    container_name: cc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_creator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_creator"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: cc-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible storage for local media upload testing (no R2 account needed).
  # Point R2_* env at MinIO in .env.local:
  #   R2_ENDPOINT=http://localhost:9000
  #   R2_ACCESS_KEY_ID=minioadmin
  #   R2_SECRET_ACCESS_KEY=minioadmin
  #   R2_BUCKET_NAME=content-creator-media
  minio:
    image: minio/minio:latest
    container_name: cc-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the media bucket on first start (MinIO does not auto-create it).
  minio-init:
    image: minio/mc:latest
    container_name: cc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/content-creator-media &&
      mc anonymous set download local/content-creator-media
      "
    restart: "no"

volumes:
  pgdata:
  redisdata:
  miniodata:
